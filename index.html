<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Diagnostic Assistant — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050a14;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,200,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .scan {
      position: fixed; left: 0; right: 0; height: 2px;
      background: linear-gradient(transparent, rgba(0,200,255,0.18), transparent);
      animation: scanline 5s linear infinite;
      pointer-events: none;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .orbit-wrap {
      position: relative;
      width: 160px; height: 160px;
      margin-bottom: 2.5rem;
    }

    .ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(0,200,255,0.2);
      animation: pulse-ring 3s ease-in-out infinite;
    }
    .ring2 { inset: 20px; animation-delay: 0.5s; border-color: rgba(120,80,255,0.2); }
    .ring3 { inset: 40px; animation-delay: 1s; border-color: rgba(0,200,255,0.15); }

    .core {
      position: absolute; inset: 55px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #1a4a6e, #0a1a2e);
      border: 1px solid rgba(0,200,255,0.5);
      display: flex; align-items: center; justify-content: center;
    }
    .core-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #00c8ff;
      animation: glow-pulse 2s ease-in-out infinite;
    }

    .node {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 50%;
      top: 50%; left: 50%;
      margin: -5px 0 0 -5px;
    }
    .node1 { background: #00c8ff; animation: orbit1 7s linear infinite; }
    .node2 { background: #a070ff; animation: orbit2 4s linear infinite; }
    .node3 { background: #00ffb0; animation: orbit3 9s linear infinite; }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid rgba(0,200,255,0.4);
      color: #00c8ff;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 1.25rem;
      background: rgba(0,200,255,0.06);
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #00c8ff;
      animation: glow-pulse 1.5s ease-in-out infinite;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 500;
      color: #e8f4ff;
      margin: 0 0 0.75rem;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    h1 span { color: #00c8ff; }

    .sub {
      font-size: 1rem;
      color: rgba(180,210,240,0.65);
      margin: 0 0 2rem;
      line-height: 1.6;
      max-width: 400px;
    }

    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,200,255,0.4), transparent);
      margin: 0 auto 1.5rem;
    }

    .tagline {
      display: block;
      font-size: 13px;
      color: rgba(0,200,255,0.55);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .nodes-row {
      display: flex; gap: 20px;
      margin-top: 1.5rem;
      justify-content: center;
    }
    .mini-node {
      width: 8px; height: 8px;
      border-radius: 50%;
      border: 1px solid rgba(0,200,255,0.4);
      background: rgba(0,200,255,0.1);
    }
    .mini-node:nth-child(2) { border-color: rgba(120,80,255,0.5); background: rgba(120,80,255,0.1); }
    .mini-node:nth-child(3) { border-color: rgba(0,255,176,0.4); background: rgba(0,255,176,0.1); }

    @keyframes orbit1 {
      from { transform: rotate(0deg) translateX(54px) rotate(0deg); }
      to   { transform: rotate(360deg) translateX(54px) rotate(-360deg); }
    }
    @keyframes orbit2 {
      from { transform: rotate(180deg) translateX(38px) rotate(-180deg); }
      to   { transform: rotate(540deg) translateX(38px) rotate(-540deg); }
    }
    @keyframes orbit3 {
      from { transform: rotate(90deg) translateX(70px) rotate(-90deg); }
      to   { transform: rotate(450deg) translateX(70px) rotate(-450deg); }
    }
    @keyframes pulse-ring {
      0%,100% { transform: scale(1); opacity: 0.4; }
      50%      { transform: scale(1.15); opacity: 0.15; }
    }
    @keyframes scanline {
      0%   { transform: translateY(-100vh); }
      100% { transform: translateY(200vh); }
    }
    @keyframes glow-pulse {
      0%,100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }
    @keyframes fadeup {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .content { animation: fadeup 0.8s ease both; }
  </style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="scan"></div>

  <div class="page">
    <div class="orbit-wrap">
      <div class="ring"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>
      <div class="node node1"></div>
      <div class="node node2"></div>
      <div class="node node3"></div>
      <div class="core"><div class="core-dot"></div></div>
    </div>

    <div class="content">
      <div class="badge"><span class="badge-dot"></span> Coming Soon</div>
      <h1>AI <span>Diagnostic</span> Assistant</h1>
      <p class="sub">
        Something powerful is on its way.<br>
        An intelligent diagnostic experience.
      </p>
      <div class="divider"></div>
      <span class="tagline">Check back soon</span>
      <div class="nodes-row">
        <div class="mini-node"></div>
        <div class="mini-node"></div>
        <div class="mini-node"></div>
      </div>
    </div>
  </div>

</body>
</html>
