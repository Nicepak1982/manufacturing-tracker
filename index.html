<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  canvas#bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
    max-width: 780px;
  }

  .badge {
    display: inline-block;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: #00f5d4;
    border: 1px solid #00f5d4;
    padding: 6px 18px;
    margin-bottom: 2rem;
    text-transform: uppercase;
    animation: pulse-border 2.5s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0px #00f5d4, inset 0 0 0px #00f5d4; opacity: 1; }
    50% { box-shadow: 0 0 14px #00f5d4, inset 0 0 8px rgba(0,245,212,0.1); opacity: 0.85; }
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.8rem, 8vw, 6.5rem);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #ffffff 30%, #00f5d4 70%, #7b2fff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.4rem;
  }

  .sub-headline {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1rem, 3vw, 1.6rem);
    font-weight: 400;
    color: #7b2fff;
    letter-spacing: 6px;
    text-transform: uppercase;
  }

  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: fixed;
    width: 60px;
    height: 60px;
    z-index: 5;
  }
  .corner-tl { top: 20px; left: 20px; border-top: 1px solid #00f5d4; border-left: 1px solid #00f5d4; }
  .corner-tr { top: 20px; right: 20px; border-top: 1px solid #00f5d4; border-right: 1px solid #00f5d4; }
  .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid #00f5d4; border-left: 1px solid #00f5d4; }
  .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid #00f5d4; border-right: 1px solid #00f5d4; }

  .scan-line {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, #00f5d4 50%, transparent 100%);
    opacity: 0.4;
    animation: scan 6s linear infinite;
    z-index: 6;
  }

  @keyframes scan {
    0% { top: 0; }
    100% { top: 100vh; }
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="scan-line"></div>
<div class="corner-tl"></div>
<div class="corner-tr"></div>
<div class="corner-bl"></div>
<div class="corner-br"></div>

<div class="content">
  <div class="badge">&#9670; Next Generation &#9670;</div>
  <h1>SOMETHING<br>NEW</h1>
  <div class="sub-headline">is on the way</div>
</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function Particle() {
  this.x = Math.random() * W;
  this.y = Math.random() * H;
  this.vx = (Math.random() - 0.5) * 0.4;
  this.vy = (Math.random() - 0.5) * 0.4;
  this.r = Math.random() * 1.5 + 0.4;
  this.alpha = Math.random() * 0.6 + 0.2;
  this.color = Math.random() > 0.7 ? '#00f5d4' : Math.random() > 0.5 ? '#7b2fff' : '#ffffff';
}

Particle.prototype.update = function() {
  this.x += this.vx;
  this.y += this.vy;
  if (this.x < 0) this.x = W;
  if (this.x > W) this.x = 0;
  if (this.y < 0) this.y = H;
  if (this.y > H) this.y = 0;
};

Particle.prototype.draw = function() {
  ctx.beginPath();
  ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
  ctx.fillStyle = this.color;
  ctx.globalAlpha = this.alpha;
  ctx.fill();
};

function init() {
  resize();
  particles = [];
  for (let i = 0; i < 120; i++) particles.push(new Particle());
}

function drawGrid() {
  const spacing = 80;
  ctx.globalAlpha = 0.03;
  ctx.strokeStyle = '#00f5d4';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += spacing) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function animate() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.globalAlpha = 1;
  ctx.fillRect(0, 0, W, H);

  drawGrid();

  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 110) {
        ctx.globalAlpha = (1 - dist / 110) * 0.18;
        ctx.strokeStyle = '#00f5d4';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  particles.forEach(p => { p.update(); p.draw(); });
  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}

init();
animate();
window.addEventListener('resize', init);
</script>
</body>
</html>
